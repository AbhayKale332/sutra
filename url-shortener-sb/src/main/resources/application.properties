spring.application.name=url-shortener-sb

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


jwt.secret=${JWT_SECRET}
jwt.expiration=172800000


logging.level.org.springframework.security=DEBUG
logging.level.org.url.shortener=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.springframework.web.servlet=TRACE

frontend.url=${FRONTEND_URL}
#Local host config
# spring.datasource.url=jdbc:mysql://localhost:3306/urlshortenerdb
# spring.datasource.username=root
# spring.datasource.password=your_password

# Redis Configuration
spring.data.redis.url=${REDIS_URL}

# Keep short URL cache entries until memory pressure requires app-level cleanup.
# 25 MB threshold, then evict idle shortUrls::* keys until memory drops near 22 MB.
app.redis.short-url-cache.enabled=true
app.redis.short-url-cache.cleanup-interval-ms=60000
app.redis.short-url-cache.memory-threshold-bytes=26214400
app.redis.short-url-cache.target-memory-bytes=23068672
app.redis.short-url-cache.scan-count=1000

# Click buffer sync interval (how often Redis clicks are flushed to MySQL)
# Override via env var: APP_CLICK_SYNC_INTERVAL_MS=60000
app.click-sync.interval-ms=30000
